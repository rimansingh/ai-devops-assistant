name: Deploy Backend to HuggingFace

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup git
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

      - name: Push backend folder to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_BACKEND_SPACE_ID }}
        run: |
          cd backend
          git init
          git remote add hf https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}
          git add .
          git commit -m "sync from GitHub ${{ github.sha }}"
          git push hf main --force
